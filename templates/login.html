{% extends 'base.html' %}

{% block title %}Iniciar Sesion{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card card-custom">
            <div class="card-header card-header-custom text-center py-3">
                <h3 class="mb-0">Iniciar Sesion</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuario</label>
                        <input type="text" name="username" class="form-control" id="id_username" placeholder="Ingresa tu usuario" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" id="id_password" placeholder="Ingresa tu contraseña" required>
                    </div>
                    
                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Usuario o contraseña incorrectos. Por favor intenta de nuevo.
                        </div>
                    {% endif %}
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary-custom btn-lg">Ingresar</button>
                    </div>
                </form>
                
                <div class="text-center mt-3">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none text-primary-blue">¿Olvidaste tu contraseña?</a>
                </div>
                
                <hr class="my-3">
                
                <div class="text-center">
                    <p class="mb-2">¿No tienes cuenta?</p>
                    <a href="{% url 'register' %}" class="btn btn-outline-primary">Registrate aqui</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
